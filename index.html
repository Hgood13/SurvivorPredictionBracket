<!doctype html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Survivor 50 Predictions</title>
  <style>
    :root {
      --jungle: #1F3D2B;
      --wood: #5C3A21;
      --sand: #C9A66B;
      --fire: #C45A2A;
      --gold: #D4AF37;
      --ocean: #0E4A5A;
    }

    * { margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: linear-gradient(135deg, #F5E6D3 0%, #EDD5BB 100%);
      color: var(--jungle);
      padding: 16px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
      background: linear-gradient(180deg, rgba(95, 61, 43, 0.9) 0%, rgba(31, 61, 43, 0.95) 100%);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .logo-container {
      margin-bottom: 12px;
    }

    .logo-container img {
      max-width: 200px;
      height: auto;
      filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
    }

    h1 {
      font-size: 28px;
      color: var(--gold);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .sub {
      color: var(--sand);
      font-size: 14px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(135deg, rgba(92, 58, 33, 0.85) 0%, rgba(95, 61, 43, 0.9) 100%);
      border: 2px solid var(--gold);
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(5px);
    }

    .prediction-item {
      background: linear-gradient(135deg, rgba(201, 166, 107, 0.15) 0%, rgba(196, 90, 42, 0.1) 100%);
      border: 1px solid var(--sand);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      backdrop-filter: blur(4px);
    }

    .prediction-name {
      font-weight: 700;
      color: var(--fire);
      margin-bottom: 8px;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .prediction-details {
      font-size: 13px;
      color: var(--jungle);
    }

    .prediction-row {
      margin: 6px 0;
      padding-left: 8px;
      border-left: 2px solid var(--fire);
    }

    .label {
      font-weight: 600;
      color: var(--fire);
      margin-right: 6px;
    }

    .loading, .empty {
      color: var(--jungle);
      text-align: center;
      padding: 20px;
      font-style: italic;
    }

    a.button {
      display: block;
      padding: 14px 20px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--fire) 0%, #A83A1A 100%);
      color: white;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
      box-sizing: border-box;
      margin-top: 16px;
      border: 2px solid var(--gold);
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    a.button:hover {
      background: linear-gradient(135deg, #B84A23 0%, #8B2F16 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <img src="images/Survivor_Logo.jpg" alt="Survivor 50 Logo" />
    </div>
    <h1>Survivor 50</h1>
    <p class="sub">Prediction Bracket</p>
  </div>

  <div class="container">
    <div class="card">
      <div id="predictionsContainer" class="loading">Loading predictions...</div>
    </div>

    <div class="card">
      <a href="simple-submit.html" class="button">📝 Make Your Prediction</a>
    </div>
  </div>

<script>
  const supabaseUrl = 'https://njtztqqfxjuccoknuqcc.supabase.co';
  const supabaseKey = 'sb_publishable_x-bOkXbobyjWtfC95PW81A_zEg5Deln';
  
  let supabaseClient;
  
  // Initialize Supabase when script loads
  setTimeout(() => {
    if (window.supabase) {
      supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
      loadPredictions();
    }
  }, 100);

  async function loadPredictions() {
    const container = document.getElementById("predictionsContainer");
    
    try {
      const { data, error } = await supabaseClient
        .from("predictions")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        container.innerHTML = `<div class="empty">Error loading predictions: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty">No predictions submitted yet. Be the first!</div>';
        return;
      }

      container.innerHTML = data.map(pred => `
        <div class="prediction-item">
          <div class="prediction-name">${escapeHtml(pred.username || "Anonymous")}</div>
          <div class="prediction-details">
            <div class="prediction-row"><span class="label">Winner:</span> ${escapeHtml(pred.winner || "—")}</div>
            <div class="prediction-row"><span class="label">Runner-up:</span> ${escapeHtml(pred.runner_up || "—")}</div>
            <div class="prediction-row"><span class="label">Top 5:</span> ${formatArray(pred.top5)}</div>
            <div class="prediction-row"><span class="label">Top 10:</span> ${formatArray(pred.top10)}</div>
            <div class="prediction-row"><span class="label">Merge:</span> ${formatArray(pred.merge)}</div>
            <div class="prediction-row"><span class="label">First Juror:</span> ${escapeHtml(pred.first_juror || "—")}</div>
            <div class="prediction-row"><span class="label">Most Challenges:</span> ${escapeHtml(pred.most_indi_challenges || "—")}</div>
          </div>
        </div>
      `).join("");
    } catch (err) {
      container.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
    }
  }

  function formatArray(arr) {
    if (!arr || !Array.isArray(arr) || arr.length === 0) return "—";
    return arr.map(escapeHtml).join(", ");
  }

  function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }
</script>
</body>
</html>
