<!doctype html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Survivor 50 Predictions</title>
  <style>
    body {
      font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .sub { opacity: 0.8; font-size: 13px; margin: 0 0 16px; }
    .card { border: 1px solid rgba(127,127,127,0.35); border-radius: 12px; padding: 12px; margin: 12px 0; }
    
    .prediction-item {
      background: rgba(127,127,127,0.08);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .prediction-name { font-weight: 600; margin-bottom: 6px; }
    .prediction-details { font-size: 13px; opacity: 0.85; }
    .prediction-row { margin: 4px 0; }
    .label { font-weight: 500; }
    
    .loading { opacity: 0.6; font-style: italic; }
    .empty { opacity: 0.7; text-align: center; padding: 20px; }
    
    a.button {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0,128,255,0.18);
      color: inherit;
      text-decoration: none;
      text-align: center;
      font-weight: 500;
      font-size: 16px;
      box-sizing: border-box;
      margin-top: 12px;
      border: 1px solid rgba(0,128,255,0.35);
      transition: background 0.2s;
    }
    a.button:hover { background: rgba(0,128,255,0.25); }
  </style>
</head>
<body>
  <h1>Survivor 50 Predictions</h1>
  <p class="sub">View all submitted predictions</p>

  <div class="card">
    <div id="predictionsContainer" class="loading">Loading predictions...</div>
  </div>

  <div class="card">
    <a href="simple-submit.html" class="button">📝 Make Your Prediction</a>
  </div>

<script>
  const supabaseUrl = 'https://njtztqqfxjuccoknuqcc.supabase.co';
  const supabaseKey = 'sb_publishable_x-bOkXbobyjWtfC95PW81A_zEg5Deln';
  
  let supabaseClient;
  
  // Initialize Supabase when script loads
  setTimeout(() => {
    if (window.supabase) {
      supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
      loadPredictions();
    }
  }, 100);

  async function loadPredictions() {
    const container = document.getElementById("predictionsContainer");
    
    try {
      const { data, error } = await supabaseClient
        .from("predictions")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        container.innerHTML = `<div class="empty">Error loading predictions: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty">No predictions submitted yet. Be the first!</div>';
        return;
      }

      container.innerHTML = data.map(pred => `
        <div class="prediction-item">
          <div class="prediction-name">${escapeHtml(pred.username || "Anonymous")}</div>
          <div class="prediction-details">
            <div class="prediction-row"><span class="label">Winner:</span> ${escapeHtml(pred.winner || "—")}</div>
            <div class="prediction-row"><span class="label">Runner-up:</span> ${escapeHtml(pred.runner_up || "—")}</div>
            <div class="prediction-row"><span class="label">Top 5:</span> ${formatArray(pred.top5)}</div>
            <div class="prediction-row"><span class="label">Top 10:</span> ${formatArray(pred.top10)}</div>
            <div class="prediction-row"><span class="label">Merge:</span> ${formatArray(pred.merge)}</div>
            <div class="prediction-row"><span class="label">First Juror:</span> ${escapeHtml(pred.first_juror || "—")}</div>
            <div class="prediction-row"><span class="label">Most Challenges:</span> ${escapeHtml(pred.most_indi_challenges || "—")}</div>
          </div>
        </div>
      `).join("");
    } catch (err) {
      container.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
    }
  }

  function formatArray(arr) {
    if (!arr || !Array.isArray(arr) || arr.length === 0) return "—";
    return arr.map(escapeHtml).join(", ");
  }

  function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }
</script>
</body>
</html>
