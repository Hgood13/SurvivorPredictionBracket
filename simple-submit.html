<!doctype html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Submit - Survivor 50</title>
  <style>
    :root {
      --jungle: #1F3D2B;
      --wood: #5C3A21;
      --sand: #C9A66B;
      --fire: #C45A2A;
      --gold: #D4AF37;
      --ocean: #0E4A5A;
    }

    * { margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: linear-gradient(135deg, #F5E6D3 0%, #EDD5BB 100%);
      color: var(--jungle);
      padding: 16px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
      background: linear-gradient(180deg, rgba(95, 61, 43, 0.9) 0%, rgba(31, 61, 43, 0.95) 100%);
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 24px;
      color: var(--gold);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      letter-spacing: 1px;
    }

    .container {
      max-width: 450px;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(135deg, rgba(92, 58, 33, 0.85) 0%, rgba(95, 61, 43, 0.9) 100%);
      border: 2px solid var(--gold);
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(5px);
    }

    form div {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--fire);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--sand);
      background: rgba(245, 230, 211, 0.9);
      font-size: 14px;
      box-sizing: border-box;
      color: var(--jungle);
      font-family: 'Georgia', serif;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: var(--fire);
      box-shadow: 0 0 0 3px rgba(196, 90, 42, 0.2);
      background: rgba(245, 230, 211, 1);
    }

    select[multiple] {
      min-height: 120px;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    button,
    a.back-button {
      padding: 12px;
      border-radius: 6px;
      border: 2px solid var(--gold);
      background: linear-gradient(135deg, var(--fire) 0%, #A83A1A 100%);
      color: white;
      font-size: 14px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover,
    a.back-button:hover {
      background: linear-gradient(135deg, #B84A23 0%, #8B2F16 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    }

    a.back-button {
      background: linear-gradient(135deg, var(--wood) 0%, #3A2414 100%);
      border-color: var(--sand);
    }

    a.back-button:hover {
      background: linear-gradient(135deg, #6B4F31 0%, #2A1A0A 100%);
    }

    #status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 6px;
      display: none;
      border: 1px solid;
      font-weight: 600;
    }

    #status.success {
      background: rgba(31, 61, 43, 0.2);
      color: var(--jungle);
      border-color: var(--jungle);
    }

    #status.error {
      background: rgba(196, 90, 42, 0.2);
      color: var(--fire);
      border-color: var(--fire);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Survivor 50</h1>
  </div>

  <div class="container">
    <div class="card">
      <form id="predictionForm">
      <div>
        <label for="username">Your Name</label>
        <input type="text" id="username" placeholder="Enter your name" required />
      </div>

      <div>
        <label for="winner">Winner</label>
        <select id="winner" required></select>
      </div>

      <div>
        <label for="runnerUp">Runner-up</label>
        <select id="runnerUp" required></select>
      </div>

      <div>
        <label for="top5">Top 5 (hold Ctrl/Cmd to select multiple)</label>
        <select id="top5" multiple size="8"></select>
      </div>

      <div>
        <label for="top10">Top 10 (hold Ctrl/Cmd to select multiple)</label>
        <select id="top10" multiple size="8"></select>
      </div>

      <div>
        <label for="merge">Merge Group (hold Ctrl/Cmd to select multiple)</label>
        <select id="merge" multiple size="8"></select>
      </div>

      <div>
        <label for="firstJuror">First Juror</label>
        <select id="firstJuror" required></select>
      </div>

      <div>
        <label for="mostIndi">Most Individual Challenges Won</label>
        <select id="mostIndi" required></select>
      </div>

      <div class="button-group">
        <button type="submit" id="submitBtn">Submit</button>
        <a href="view-predictions.html" class="back-button">Back</a>
      </div>
      <div id="status"></div>
    </form>
    </div>
  </div>

<script>
  const supabaseUrl = 'https://njtztqqfxjuccoknuqcc.supabase.co';
  const supabaseKey = 'sb_publishable_x-bOkXbobyjWtfC95PW81A_zEg5Deln';
  
  let supabaseClient;
  
  // Initialize Supabase when script loads
  setTimeout(() => {
    if (window.supabase) {
      supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    }
  }, 100);

  const CONTESTANTS = [
    "Joe Hunter",
    "Savannah Louie",
    "Christian Hubicki",
    "Cirie Fields",
    "Ozzy Lusth",
    "Emily Flippen",
    "Rick Devens",
    "Jenna Lewis-Dougherty",
    "Jonathan Young",
    "Dee Valladares",
    "Mike White",
    "Kamilla Karthigesu",
    "Charlie Davis",
    "Tiffany Ervin",
    'Benjamin "Coach" Wade',
    "Chrissy Hofbeck",
    "Colby Donaldson",
    "Genevieve Mushaluk",
    "Rizo Velovic",
    "Angelina Keeley",
    "Q Burdette",
    "Stephenie LaGrossa Kendrick",
    "Kyle Fraser",
    "Aubry Bracco"
  ];

  // Populate all select dropdowns
  function populateSelects() {
    const singleSelects = ["winner", "runnerUp", "firstJuror", "mostIndi"];
    const multiSelects = ["top5", "top10", "merge"];

    singleSelects.forEach(id => {
      const select = document.getElementById(id);
      select.innerHTML = '<option value="">-- Select --</option>';
      CONTESTANTS.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
    });

    multiSelects.forEach(id => {
      const select = document.getElementById(id);
      select.innerHTML = '';
      CONTESTANTS.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
    });
  }

  function getSelectedValues(selectId) {
    const select = document.getElementById(selectId);
    return Array.from(select.selectedOptions).map(opt => opt.value);
  }

  // Handle form submission
  document.getElementById("predictionForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const statusEl = document.getElementById("status");
    statusEl.textContent = "Sending...";
    statusEl.className = "";
    statusEl.style.display = "block";

    const predictions = {
      username: document.getElementById("username").value,
      winner: document.getElementById("winner").value,
      runner_up: document.getElementById("runnerUp").value,
      top5: getSelectedValues("top5"),
      top10: getSelectedValues("top10"),
      merge: getSelectedValues("merge"),
      first_juror: document.getElementById("firstJuror").value,
      most_indi_challenges: document.getElementById("mostIndi").value
    };

    console.log("Submitting:", predictions);

    const { data, error } = await supabaseClient
      .from("predictions")
      .insert([predictions]);

    if (error) {
      statusEl.textContent = `Error: ${error.message}`;
      statusEl.className = "error";
      console.error("Supabase error:", error);
    } else {
      statusEl.textContent = "✓ Predictions submitted successfully!";
      statusEl.className = "success";
      document.getElementById("predictionForm").reset();
      console.log("Success:", data);
    }
  });

  // Populate dropdowns on page load
  document.addEventListener('DOMContentLoaded', populateSelects);
</script>
</body>
</html>
