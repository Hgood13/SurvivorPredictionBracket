<!doctype html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Submit - Survivor 50</title>
  <style>
    body {
      font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      max-width: 400px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    .card { border: 1px solid rgba(127,127,127,0.35); border-radius: 12px; padding: 12px; margin: 12px 0; }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(0,128,255,0.18);
      font-size: 16px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: rgba(0,128,255,0.25); }
    #status { margin-top: 12px; padding: 10px; border-radius: 8px; display: none; }
    #status.success { background: rgba(0,200,0,0.2); color: rgba(0,100,0,1); }
    #status.error { background: rgba(200,0,0,0.2); color: rgba(100,0,0,1); }
  </style>
</head>
<body>
  <h1>Quick Submission</h1>
  
  <div class="card">
    <p>Submit predefined predictions to database.</p>
    <button id="submitBtn">Send Test Predictions</button>
    <div id="status"></div>
  </div>

<script>
  const supabaseUrl = 'https://njtztqqfxjuccoknuqcc.supabase.co';
  const supabaseKey = 'sb_publishable_x-bOkXbobyjWtfC95PW81A_zEg5Deln';
  
  let supabaseClient;
  
  // Initialize Supabase when script loads
  setTimeout(() => {
    if (window.supabase) {
      supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    }
  }, 100);

  const testPredictions = {
    username: "testUser",
    winner: "Joe Hunter",
    runner_up: "Savannah Louie",
    top5: ["Christian Hubicki", "Cirie Fields", "Ozzy Lusth","Emily Flippen", "Rick Devens"],
    top10: ["Emily Flippen", "Rick Devens", "Jenna Lewis", "Jonathan Young", "Dee Valladares","Emily Flippen", "Rick Devens", "Jenna Lewis", "Jonathan Young", "Dee Valladares"],
    merge: ["Mike White", "Kamilla Karthigesu", "Charlie Davis", "Tiffany Ervin"],
    first_juror: "Coach Wade",
    most_indi_challenges: "Q Burdette"
  };

  document.getElementById("submitBtn").addEventListener("click", async () => {
    const statusEl = document.getElementById("status");
    statusEl.textContent = "Sending...";
    statusEl.className = "";
    statusEl.style.display = "block";

    console.log("Submitting:", testPredictions);

    const { data, error } = await supabaseClient
      .from("predictions")
      .insert([testPredictions]);

    if (error) {
      statusEl.textContent = `Error: ${error.message}`;
      statusEl.className = "error";
      console.error("Supabase error:", error);
    } else {
      statusEl.textContent = "✓ Predictions submitted successfully!";
      statusEl.className = "success";
      console.log("Success:", data);
    }
  });
</script>
</body>
</html>
